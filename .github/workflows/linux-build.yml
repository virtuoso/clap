name: linux-build
on: [push]
jobs:
  build-ubuntu:
    runs-on: ubuntu-24.04
    env:
      remote_host: ${{ secrets.REMOTE_DEPLOY_HOST }}
      VCPKG_INSTALLATION_ROOT: ${{ github.workspace }}/vcpkg-mingw
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: Fetch tags
        run: git fetch --force --prune --unshallow --tags
      - name: submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive --depth 1
      - name: Download dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfreetype-dev libglfw3-dev libpng-dev zlib1g-dev glslc spirv-cross gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 libxinerama-dev libxcursor-dev xorg-dev libglu1-mesa-dev pkg-config
          git clone --depth 1 git@github.com:virtuoso/vcpkg-mingw.git
          cd vcpkg-mingw
          ./bootstrap-vcpkg.sh -disableMetrics
      - name: Cache vcpkg
        uses: actions/cache@v3
        with:
          path: |
            vcpkg-mingw/installed
            vcpkg-mingw/packages
            vcpkg-mingw/buildtrees
            vcpkg-mingw/downloads
          key: vcpkg-mingw-cross-${{ hashFiles('vcpkg-mingw/vcpkg.json', 'vcpkg-mingw/ports/**', 'triplets/**') }}
          restore-keys: |
            vcpkg-mingw-cross-
      - name: Build dependencies
        run: |
          cd vcpkg-mingw
          ./vcpkg install libpng:x64-mingw glfw3:x64-mingw freetype:x64-mingw glfw3:x64-linux
      - name: configure
        run: |
          cd ${{ github.workspace }}
          cmake --preset=debug
          cmake --preset=test-ship
          cmake --preset=rel-ship
          cmake --preset=w32debug-cross -DCMAKE_INSTALL_PREFIX:FILEPATH=./clap/${GITHUB_REF##*/}/w32debug
          cmake --preset=w32test-cross -DCMAKE_INSTALL_PREFIX:FILEPATH=./clap/${GITHUB_REF##*/}/w32test
          cmake --preset=w32rel-cross -DCMAKE_INSTALL_PREFIX:FILEPATH=./clap/${GITHUB_REF##*/}/w32rel
      - name: build
        run: |
          cd ${{ github.workspace }}
          cmake --build build/debug --parallel 4
          cmake --build build/test-ship --parallel 4
          cmake --build build/rel-ship --parallel 4
          ctest --test-dir build/debug --output-on-failure
          cmake --build build/w32debug --parallel 4
          cmake --build build/w32test --parallel 4
          cmake --build build/w32rel --parallel 4
          cmake --install build/rel-ship --prefix="$GITHUB_WORKSPACE/clap/${{ github.ref_name }}/linux/rel"
          cmake --install build/test-ship --prefix="$GITHUB_WORKSPACE/clap/${{ github.ref_name }}/linux/test"
          cmake --install build/debug --prefix="$GITHUB_WORKSPACE/clap/${{ github.ref_name }}/linux/debug"
          cmake --install build/w32debug
          cmake --install build/w32test
          cmake --install build/w32rel
      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@main
        if: ${{ env.remote_host }}
        with:
          SSH_PRIVATE_KEY: ${{ secrets.REMOTE_DEPLOY_KEY }}
          ARGS: "-rlzvc -i"
          SOURCE: "clap/"
          REMOTE_HOST: ${{ secrets.REMOTE_DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_DEPLOY_USER }}
          TARGET: ${{ secrets.REMOTE_DEPLOY_TARGET }}
