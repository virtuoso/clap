name: macos-build
on: [push]
jobs:
  build-macos:
    runs-on: macos-15
    env:
      remote_host: ${{ secrets.REMOTE_DEPLOY_HOST }}
      team_id: ${{ secrets.MACOS_DEV_TEAM_ID }}
      notary_apple_id: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
      notary_password: ${{ secrets.MACOS_NOTARY_APP_PASSWORD }}
      notary_profile: clap-notarytool
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: Fetch tags
        run: git fetch --force --prune --unshallow --tags
      - name: submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive --depth 1
      - name: install-cert
        if: ${{ env.team_id }}
        run: |
          echo "${{ secrets.MACOS_DEV_ID_P12 }}" | base64 --decode > clap_dev_id.p12
          security create-keychain -p temp_pass build.keychain
          security -q import clap_dev_id.p12 -k build.keychain -P "${{ secrets.MACOS_DEV_ID_P12_PASSWORD }}" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain login.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp_pass build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          if ! security -q set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp_pass build.keychain >/tmp/clap-security.log 2>&1; then
            cat /tmp/clap-security.log
            exit 1
          fi
      - name: install-notarytool-profile
        if: ${{ env.notary_apple_id && env.notary_password && env.team_id }}
        run: |
          xcrun notarytool store-credentials "${{ env.notary_profile }}" \
            --apple-id "${{ env.notary_apple_id }}" \
            --password "${{ env.notary_password }}" \
            --team-id "${{ env.team_id }}"
      - name: install-deps
        run: |
          brew install zlib glfw shaderc spirv-cross
      - name: configure
        run: |
          cd ${{ github.workspace }}
          touch build_config
          echo opts=\"--parallel 3\" >> build_config
          codesign_identity=$(security find-identity -v -p codesigning build.keychain 2>/dev/null | awk '/Developer ID Application:/ {print $2; exit}')
          clap_opts="-DCMAKE_INSTALL_PREFIX:FILEPATH=./clap/${GITHUB_REF##*/}/macos -DCLAP_DEMOS_BUILD_IN_ASSETS:BOOL=ON"
          if [ -n "$codesign_identity" ]; then
            clap_opts="$clap_opts -DCLAP_MACOS_CODESIGN_IDENTITY=$codesign_identity"
          fi
          if [ -n "$codesign_identity" ] && [ -n "${{ env.notary_apple_id }}" ] && [ -n "${{ env.notary_password }}" ] && [ -n "${{ env.team_id }}" ]; then
            clap_opts="$clap_opts -DCLAP_MACOS_NOTARYTOOL_PROFILE=${{ env.notary_profile }}"
          fi
          printf 'CLAP_OPTS="%s"\n' "$clap_opts" >> build_config
          ./configure.sh
          cmake --preset=mtltest
          cmake --preset=mtldebug
      - name: build
        run: |
          cd ${{ github.workspace }}
          ./build.sh
          cmake --build build/mtltest --parallel 3
          cmake --build build/mtldebug --parallel 3
          cmake --install build/rel --prefix="$GITHUB_WORKSPACE/clap/${{ github.ref_name }}/macos/rel"
          cmake --install build/test --prefix="$GITHUB_WORKSPACE/clap/${{ github.ref_name }}/macos/test"
          cmake --install build/debug --prefix="$GITHUB_WORKSPACE/clap/${{ github.ref_name }}/macos/debug"
          git config --global --unset url."https://github.com/".insteadOf
      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@main
        if: ${{ env.remote_host }}
        with:
          SSH_PRIVATE_KEY: ${{ secrets.REMOTE_DEPLOY_KEY }}
          ARGS: "-rlzvc -i --delete"
          SOURCE: "clap/${{ github.ref_name }}/macos"
          REMOTE_HOST: ${{ secrets.REMOTE_DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_DEPLOY_USER }}
          TARGET: "${{ secrets.REMOTE_DEPLOY_TARGET }}/${{ github.ref_name }}"
